files:

  extract_proteins_from_cds_genomes.py:
    purpose: >
      Extracts protein sequences from Prokka output directories
      and generates summary CSV + combined FASTA.
    inputs:
      - Prokka genome folders
    outputs:
      - proteins_summary.csv
      - combined_proteins.faa
    dependencies:
      - pandas
      - biopython
    stability: experimental




